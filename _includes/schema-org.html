{%- comment -%}
  Sitewide entity graph: Organization + LocalBusiness + WebSite, linked by @id.
  Sourced entirely from _data/business.yml. Loaded on every page via head.html.
{%- endcomment -%}
{%- assign b = site.data.business -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "{{ b.url }}/#organization",
      "name": {{ b.name | jsonify }},
      "url": "{{ b.url }}/",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ b.logo | absolute_url }}",
        "width": 180,
        "height": 180
      },
      "image": "{{ b.image | absolute_url }}",
      "description": {{ b.description | strip_newlines | jsonify }},
      "telephone": "{{ b.telephone }}",
      "email": "{{ b.email }}",
      "foundingDate": "{{ b.founding_date }}",
      "founder": { "@type": "Person", "name": {{ b.founder | jsonify }} },
      "sameAs": {{ b.same_as | jsonify }}
    },
    {
      "@type": ["LocalBusiness", "SportsActivityLocation"],
      "@id": "{{ b.url }}/#localbusiness",
      "name": {{ b.name | jsonify }},
      "url": "{{ b.url }}/",
      "image": "{{ b.image | absolute_url }}",
      "logo": "{{ b.logo | absolute_url }}",
      "telephone": "{{ b.telephone }}",
      "email": "{{ b.email }}",
      "priceRange": "{{ b.price_range }}",
      "parentOrganization": { "@id": "{{ b.url }}/#organization" },
      "hasMap": "{{ b.map_url }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": {{ b.address.street | jsonify }},
        "addressLocality": {{ b.address.locality | jsonify }},
        "addressRegion": "{{ b.address.region }}",
        "postalCode": "{{ b.address.postal_code }}",
        "addressCountry": "{{ b.address.country }}"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": {{ b.geo.latitude }},
        "longitude": {{ b.geo.longitude }}
      },
      "openingHoursSpecification": [
        {%- for h in b.hours -%}
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": {{ h.days | jsonify }},
          "opens": "{{ h.opens }}",
          "closes": "{{ h.closes }}"
        }{% unless forloop.last %},{% endunless %}
        {%- endfor -%}
      ],
      "areaServed": [
        {%- for a in b.area_served -%}
        { "@type": "City", "name": {{ a | jsonify }} }{% unless forloop.last %},{% endunless %}
        {%- endfor -%}
      ],
      "sameAs": {{ b.same_as | jsonify }}
    },
    {
      "@type": "WebSite",
      "@id": "{{ b.url }}/#website",
      "url": "{{ b.url }}/",
      "name": {{ b.name | jsonify }},
      "publisher": { "@id": "{{ b.url }}/#organization" }
    }
  ]
}
</script>
