<!-- ── PHOTO GRID HYDRATION ─────────────────────────────────────
     The CMS stores each photo grid as an empty carrier div:
         <div class="tw-photo-grid" data-pgrid="BASE64"></div>
     (empty because Decap's editor leaks any child HTML out of the
     component block — see admin/index.html). This script reads that
     data attribute on page load and builds the real grid markup:
     imgs for photo slots, a callout tile for the stat. The slot logic
     mirrors toBlock/toPreview in the CMS component exactly. -->
<script>
(function () {
  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;')
                    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function decode(b64) {
    try {
      var bin = atob(b64);
      var pct = bin.split('').map(function (c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join('');
      return JSON.parse(decodeURIComponent(pct));
    } catch (e) { return null; }
  }
  function build(data) {
    var images = [];
    for (var i = 1; i <= 5; i++) {
      if (data['image_' + i]) images.push({ src: data['image_' + i], alt: data['alt_' + i] || '' });
    }
    var hasCallout = !!(data.callout_stat && String(data.callout_stat).trim());
    var total = Math.min(5, Math.max(2, images.length + (hasCallout ? 1 : 0)));
    images = images.slice(0, total - (hasCallout ? 1 : 0));
    // Callout at slot 4 for a 5-slot grid, last slot otherwise.
    var calloutPos = (total === 5 && hasCallout) ? 4 : (hasCallout ? total : 0);
    var safeStyle  = ['gold', 'charcoal', 'red'].indexOf(data.callout_style) >= 0 ? data.callout_style : 'gold';

    var slots = [], imgIdx = 0;
    for (var s = 1; s <= total; s++) {
      if (hasCallout && s === calloutPos) {
        slots.push({ type: 'callout', stat: String(data.callout_stat).trim(), label: String(data.callout_label || '').trim(), style: safeStyle });
      } else if (imgIdx < images.length) {
        slots.push({ type: 'image', src: images[imgIdx].src, alt: images[imgIdx].alt });
        imgIdx++;
      }
    }

    var html = '';
    slots.forEach(function (slot, idx) {
      var n = idx + 1;
      if (slot.type === 'image') {
        html += '<img class="tw-pg-s' + n + '" src="' + slot.src + '" alt="' + esc(slot.alt) + '" loading="lazy">';
      } else {
        html += '<div class="tw-pg-s' + n + ' tw-pg-callout tw-pg-callout--' + slot.style + '">' +
                  '<span class="tw-pg-stat">' + esc(slot.stat) + '</span>' +
                  '<span class="tw-pg-label">' + esc(slot.label) + '</span>' +
                '</div>';
      }
    });
    return { html: html, total: total };
  }
  function hydrate() {
    var nodes = document.querySelectorAll('[data-pgrid]');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      if (el.getAttribute('data-pgrid-done')) continue;
      var data = decode(el.getAttribute('data-pgrid'));
      if (!data) continue;
      var res = build(data);
      el.className = 'tw-photo-grid tw-photo-grid--' + res.total;
      el.innerHTML = res.html;
      el.setAttribute('data-pgrid-done', '1');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', hydrate);
  } else {
    hydrate();
  }
})();
</script>
