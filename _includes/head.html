<head>

  {% if site.analytics.google %}
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    } 
    gtag("js", new Date());

    gtag("config", "{{ site.analytics.google }}");
  </script>
  <!-- End Google Analytics -->
  {% endif %}

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-M6BLVK3');</script>
  <!-- End Google Tag Manager -->

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  {% seo %}
  {% feed_meta %}
  {% if page.noindex %}
  <meta name="robots" content="noindex, nofollow">
  {% endif %}

  <!-- Local business structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["LocalBusiness", "SportsActivityLocation"],
    "name": "Taekwondo University",
    "url": "{{ site.url }}/",
    "telephone": "+1-901-794-1800",
    "image": "{{ site.url }}/assets/img/banner/banner.png",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "6511 MS-305",
      "addressLocality": "Olive Branch",
      "addressRegion": "MS",
      "postalCode": "38654",
      "addressCountry": "US"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 34.9550154,
      "longitude": -89.830971
    },
    "sameAs": [
      "https://www.facebook.com/profile.php?id=100085959993238",
      "https://www.instagram.com/tkduniv/"
    ]
  }
  </script>

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/icons/favicon-180.png" />
  <link rel="icon" type="image/png" href="/assets/img/icons/favicon-32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="/assets/img/icons/favicon-16.png" sizes="16x16" />

  <!-- Bootstrap core CSS -->
  <link href="{{ "/assets/css/bootstrap.min.css" | relative_url }}?v={{ site.time | date: '%s' }}" rel="stylesheet">

  <!-- Custom fonts for this template.
       Montserrat's only remaining consumer is the footer span.copyright
       (via the heading-font mixin) — drop both once that migrates to the
       new design system's typefaces. -->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600&display=swap" rel="stylesheet" type="text/css">

  <!-- Custom styles for this theme -->
  <link href="{{ "/assets/css/agency.css" | relative_url }}?v={{ site.time | date: '%s' }}" rel="stylesheet">

  <!-- Tailwind design system (tw- prefixed; installed but not yet wired into any template) -->
  <link href="{{ "/assets/css/main.css" | relative_url }}?v={{ site.time | date: '%s' }}" rel="stylesheet">
</head>
