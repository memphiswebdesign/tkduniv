<head>

  {% if site.analytics.google %}
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    } 
    gtag("js", new Date());

    gtag("config", "{{ site.analytics.google }}");
  </script>
  <!-- End Google Analytics -->
  {% endif %}

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-M6BLVK3');</script>
  <!-- End Google Tag Manager -->

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  {% seo %}
  {% feed_meta %}
  {% if page.noindex %}
  <meta name="robots" content="noindex, nofollow">
  {% endif %}

  <!-- Plain-Markdown twin of this page, for AI crawlers. This link is the only
       way they discover it (none of them use Accept-header negotiation), and
       GPTBot/OAI-SearchBot take it a meaningful share of the time — it costs
       them far fewer tokens than our HTML. Stamped on by _plugins/md_variants.rb,
       so pages without a twin (noindex ones) simply omit the tag. -->
  {% if page.md_variant_url %}
  <link rel="alternate" type="text/markdown" href="{{ page.md_variant_url | absolute_url }}">
  {% endif %}

  <!-- Structured data (JSON-LD) — see _data/business.yml + _includes/schema-*.html -->
  {% include schema-org.html %}
  {% include schema-faq.html %}
  {% include schema-article.html %}

  <!-- Favicon / app icons (2026 circular badge).
       Files live at the site root because site.webmanifest references them
       with root-absolute paths, and /favicon.ico is what legacy browsers
       auto-discover. Version query busts the old logo out of browser caches —
       favicons are cached hard, so without it visitors keep the old mark. -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png?v={{ site.time | date: '%s' }}" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v={{ site.time | date: '%s' }}" />
  <link rel="shortcut icon" href="/favicon.ico?v={{ site.time | date: '%s' }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v={{ site.time | date: '%s' }}" />
  <link rel="manifest" href="/site.webmanifest?v={{ site.time | date: '%s' }}" />
  <meta name="theme-color" content="#12151b" />

  <!-- Bootstrap core CSS -->
  <link href="{{ "/assets/css/bootstrap.min.css" | relative_url }}?v={{ site.time | date: '%s' }}" rel="stylesheet">

  <!-- Custom fonts for this template.
       Montserrat's only remaining consumer is the footer span.copyright
       (via the heading-font mixin) — drop both once that migrates to the
       new design system's typefaces. -->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600&display=swap" rel="stylesheet" type="text/css">

  <!-- Custom styles for this theme -->
  <link href="{{ "/assets/css/agency.css" | relative_url }}?v={{ site.time | date: '%s' }}" rel="stylesheet">

  <!-- Tailwind design system (tw- prefixed; installed but not yet wired into any template) -->
  <link href="{{ "/assets/css/main.css" | relative_url }}?v={{ site.time | date: '%s' }}" rel="stylesheet">
</head>
