<header class="tw-hero tw-hero--free">
  <div class="tw-hero-media" aria-hidden="true">
    <img class="tw-hero-poster" src="{{ '/assets/img/banner/tkd-vid-still.webp' | relative_url }}" alt="" width="1920" height="1080" fetchpriority="high">
    <iframe class="tw-hero-video"
      src="https://player.vimeo.com/video/1056844370?background=1&autoplay=1&loop=1&muted=1&autopause=0"
      title="Taekwondo University training video" frameborder="0" allow="autoplay; fullscreen" tabindex="-1"></iframe>
    <div class="tw-hero-hairlines"></div>
    <div class="tw-hero-scrim"></div>
  </div>
  <div class="tw-hero-inner">
    <div class="tw-wrap">
      <h1 class="tw-hero-eyebrow">{{ page.title | escape }}</h1>
      <p class="tw-hero-title">{{ page.subtitle | escape }}</p>
      <ul class="tw-hero-perks">
        <li><span aria-hidden="true">✨</span> Free Taekwondo Class</li>
        <li><span aria-hidden="true">🥋</span> Uniform + Belt Provided</li>
      </ul>
    </div>
  </div>
</header>
