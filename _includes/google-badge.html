<div class="tw-google-badge{% if include.modifier %} {{ include.modifier }}{% endif %}" aria-label="Rated 4.8 out of 5 stars on Google">
  <img class="tw-google-badge__icon"
       src="{{ '/assets/img/google-favicon.svg' | relative_url }}"
       width="16" height="16" alt="" aria-hidden="true">
  <span class="tw-google-badge__divider" aria-hidden="true"></span>
  <span class="tw-google-badge__rating">4.8</span>
  <span class="tw-google-badge__stars" aria-hidden="true">★★★★★</span>
</div>
