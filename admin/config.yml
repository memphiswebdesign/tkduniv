# Local testing uses `npx decap-server` + this flag. `local_backend: true` is
# safe to leave here permanently — Decap only activates the local proxy when
# the CMS is loaded from localhost, so it has no effect in production.
local_backend: true

# DecapBridge PKCE auth — lets editors log in via Google/Microsoft/email
# without needing their own GitHub account or repo access.
backend:
  name: git-gateway
  repo: memphiswebdesign/tkduniv
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/bd1b56a4-02c8-4355-ad44-e993d383e635/pkce
  auth_token_endpoint: /sites/bd1b56a4-02c8-4355-ad44-e993d383e635/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://tkduniv.com

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home"
        file: "index.markdown"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Meta Description (SEO)", name: "description", widget: "text", hint: "Shown in Google search results. Aim for 120-160 characters." }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            required: false
            hint: "Shown as an expandable Q&A accordion near the bottom of the page. Leave empty to hide this section."
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "markdown", hint: "You can add links here." }

