  # User-creatable pages. Unlike the "Pages" collection above (a fixed list of
  # curated files), this is a FOLDER collection with create: true — editors get
  # an "Add new Custom Page" button. Each new page becomes a file in
  # _custom_pages/ and is served at /<slug>/. The `layout` and `permalink` are
  # NOT fields here — they're applied by Jekyll via _config.yml defaults, so an
  # editor can't break routing. (Component/block picker comes in a later pass;
  # for now the page body is a single markdown field.)
  - name: "custom-pages"
    label: "Custom Pages"
    label_singular: "Custom Page"
    folder: "_custom_pages"
    create: true
    slug: "{{slug}}"
    extension: "markdown"
    format: "yaml-frontmatter"
    summary: "{{title}}"
    fields:
      - { label: "Published", name: "published", widget: "boolean", default: true, hint: "Uncheck to take this page offline (removes it from the built site) without deleting it. Note: a new page is NOT automatically added to the site menu — a developer links it in the navigation." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Eyebrow", name: "subtitle", widget: "string", required: false, hint: "Small red label shown above the title in the header." }
      - { label: "Meta Description (SEO)", name: "description", widget: "text", hint: "Shown in Google search results — not displayed on the page itself. Aim for 120-160 characters." }
      - { label: "Intro Paragraph", name: "intro", widget: "text", required: false, hint: "Optional short paragraph shown under the title in the header." }
      - { label: "Button Text", name: "button_text", widget: "string", required: false, hint: "Optional call-to-action button in the header. Leave Button Text and Button Link both empty to hide the button." }
      - { label: "Button Link", name: "button_link", widget: "string", required: false, hint: "Where the button goes — an internal path like /free or a full URL like https://example.com." }
      - label: "Marquee Bar"
        name: "marquee_items"
        widget: "list"
        required: false
        hint: "Optional scrolling text bar shown between the header and the page body. Add short phrases — dots are inserted automatically between items. Leave empty to hide the bar."
        field: { label: "Item", name: "item", widget: "string" }
      - label: "Marquee Style"
        name: "marquee_mode"
        widget: "select"
        required: false
        default: "dark"
        hint: "Dark shows white text on a dark bar. Light shows dark text on a light bar with a subtle border."
        options:
          - { label: "Dark", value: "dark" }
          - { label: "Light", value: "light" }
      - { label: "Body", name: "body", widget: "markdown", hint: "The page content, shown below the header. Optional — you can also (or instead) build the page from Sections below." }
      - label: "Sections"
        name: "blocks"
        widget: "list"
        required: false
        label_singular: "Section"
        hint: "Pre-built sections rendered below the body, in order. Add a section, pick its type, drag to reorder."
        types:
          - label: "Photo Grid"
            name: "photo_grid"
            widget: "object"
            summary: "Photo Grid — {{fields.grid}}"
            fields:
              - label: "Photo grid"
                name: "grid"
                widget: "relation"
                collection: "photo_grids"
                value_field: "{{slug}}"
                search_fields: ["title"]
                display_fields: ["title"]
                hint: "Pick a grid from the Photo Grids library. Build grids there first, then select one here."
          - label: "Testimonial Slider"
            name: "testimonial_slider"
            widget: "object"
            summary: "Testimonials — {{fields.slider}}"
            fields:
              - label: "Testimonial Slider"
                name: "slider"
                widget: "relation"
                collection: "testimonial_sliders"
                value_field: "{{slug}}"
                search_fields: ["title"]
                display_fields: ["title"]
                hint: "Pick a slider from the Testimonials library. Build one there first, then select it here."

  # Reusable testimonials library. Build a slider once here (name, theme, cards),
  # then drop it onto any page via the Testimonial Slider block.
  - name: "testimonial_sliders"
    label: "Testimonials"
    label_singular: "Testimonial Slider"
    folder: "_testimonial_sliders"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - { label: "Name", name: "title", widget: "string", hint: "Internal name — e.g. 'Homepage Social Proof'. This is how you find it when adding it to a page." }
      - label: "Theme"
        name: "theme"
        widget: "select"
        default: "light"
        options:
          - { label: "Light (dobok background)", value: "light" }
          - { label: "Dark (ink background)", value: "dark" }
          - { label: "Dark + Photo Background", value: "dark-photo" }
      - { label: "Background Photo", name: "background_image", widget: "image", required: false, hint: "Only shown when theme is 'Dark + Photo Background'." }
      - { label: "Eyebrow Label", name: "eyebrow", widget: "string", required: false, hint: "Small uppercase label above the heading, e.g. 'What Families Say'." }
      - { label: "Section Heading", name: "heading", widget: "string", required: false, hint: "e.g. 'Proof Over Promises'" }
      - { label: "Heading Accent Word", name: "heading_accent", widget: "string", required: false, hint: "One word from the heading that gets the red underline treatment. Must match exactly (case-sensitive)." }
      - label: "Testimonial Cards"
        name: "cards"
        widget: "list"
        label_singular: "Testimonial"
        summary: "{{fields.name}}"
        fields:
          - { label: "Name", name: "name", widget: "string", required: true }
          - { label: "Photo (optional)", name: "photo", widget: "image", required: false, hint: "Upload a headshot. Leave blank to show auto-colored initials instead." }
          - { label: "Role / Label", name: "role", widget: "string", required: false, hint: "e.g. Parent · Kids Taekwondo" }
          - { label: "Quote", name: "quote", widget: "text", required: true, hint: "The testimonial text — no need to add quotation marks, they're added automatically." }
          - label: "Star Rating"
            name: "rating"
            widget: "select"
            default: "5"
            required: false
            options:
              - { label: "★★★★★  5 stars", value: "5" }
              - { label: "★★★★  4 stars", value: "4" }
              - { label: "★★★  3 stars", value: "3" }
              - { label: "★★  2 stars", value: "2" }
              - { label: "★  1 star", value: "1" }
              - { label: "No rating shown", value: "0" }

  # Reusable photo-grid library. Build a grid once here, then select it from a
  # page's Sections (Photo Grid block). 2–5 photos; add a Callout stat to turn
  # one tile into the gold/charcoal/red stat tile.
  - name: "photo_grids"
    label: "Photo Grids"
    label_singular: "Photo Grid"
    folder: "_photo_grids"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - { label: "Name", name: "title", widget: "string", hint: "Internal name so you can find this grid when adding it to a page — e.g. \"40 Years Bento\"." }
      - { label: "Photo 1", name: "image_1", widget: "image", required: true }
      - { label: "Photo 1 — alt text", name: "alt_1", widget: "string", required: false, default: "" }
      - { label: "Photo 2", name: "image_2", widget: "image", required: false, hint: "Adds a 2nd slot (minimum grid is 2-slot)." }
      - { label: "Photo 2 — alt text", name: "alt_2", widget: "string", required: false, default: "" }
      - { label: "Photo 3 (optional)", name: "image_3", widget: "image", required: false }
      - { label: "Photo 3 — alt text", name: "alt_3", widget: "string", required: false, default: "" }
      - { label: "Photo 4 (optional)", name: "image_4", widget: "image", required: false }
      - { label: "Photo 4 — alt text", name: "alt_4", widget: "string", required: false, default: "" }
      - { label: "Photo 5 (optional)", name: "image_5", widget: "image", required: false }
      - { label: "Photo 5 — alt text", name: "alt_5", widget: "string", required: false, default: "" }
      - { label: "Callout — Stat (e.g. 40+)", name: "callout_stat", widget: "string", required: false, hint: "Leave blank to skip the callout tile. A stat uses one of your 2–5 slots." }
      - { label: "Callout — Label (e.g. Years on the mat)", name: "callout_label", widget: "string", required: false }
      - label: "Callout — Background"
        name: "callout_style"
        widget: "select"
        default: "gold"
        options:
          - { label: "Gold gradient", value: "gold" }
          - { label: "Charcoal gradient", value: "charcoal" }
          - { label: "Red gradient", value: "red" }

  - name: "news"
    label: "News"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "markdown"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "news_post" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image", hint: "Also used as the social-share preview image." }
      - { label: "Excerpt / Meta Description", name: "description", widget: "text", hint: "Shown on the News grid card and used as the SEO meta description. Aim for 120-160 characters." }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "navigation"
    label: "Navigation"
    files:
      - name: "menu"
        label: "Main Navigation"
        file: "_data/menu.yaml"
        fields:
          - label: "Menu Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Link", name: "link", widget: "string", hint: "Internal page path, e.g. /about" }
              - { label: "Small subtext (optional)", name: "micro", widget: "string", required: false }
              - { label: "Show in navigation", name: "visible", widget: "boolean", default: true }
              - label: "Submenu (optional)"
                name: "submenu"
                widget: "list"
                required: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Link", name: "link", widget: "string" }
