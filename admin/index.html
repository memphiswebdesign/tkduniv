<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // ── BUTTON EDITOR COMPONENT ───────────────────────────
    // Adds a "Button" block to the rich-text toolbar (+  menu).
    // Outputs a plain HTML anchor so Jekyll's markdownify
    // passes it through without any plugin or shortcode.

    CMS.registerEditorComponent({
      id: 'button',
      label: 'Button',
      fields: [
        {
          name: 'text',
          label: 'Button Label',
          widget: 'string'
        },
        {
          name: 'url',
          label: 'URL',
          widget: 'string',
          hint: 'Use a full URL (https://…) or a relative path (/schedule)'
        },
        {
          name: 'style',
          label: 'Style',
          widget: 'select',
          options: [
            { label: 'Red Fill',   value: 'red'   },
            { label: 'Black Fill', value: 'black' }
          ],
          default: 'red'
        }
      ],

      // Pattern Decap uses to re-parse stored HTML back into the form fields
      // when the editor re-opens existing content.
      pattern: /^<p><a class="tw-btn tw-btn-md tw-btn-fill-(red|black)" href="([^"]+)">([^<]+)<\/a><\/p>$/,
      fromBlock: function (match) {
        return { style: match[1], url: match[2], text: match[3] };
      },

      // What gets written into the markdown file
      toBlock: function (data) {
        return (
          '<p><a class="tw-btn tw-btn-md tw-btn-fill-' + data.style +
          '" href="' + data.url + '">' + data.text + '</a></p>'
        );
      },

      // CMS preview pane has no site CSS, so inline the essential styles
      toPreview: function (data) {
        var bg   = data.style === 'black' ? '#12151B' : '#C00808';
        var hover = data.style === 'black' ? '#2a2f3a' : '#a30606';
        return (
          '<p style="margin:1rem 0;">' +
            '<a href="' + data.url + '" style="' +
              'display:inline-block;' +
              'background:' + bg + ';' +
              'color:#fff;' +
              'font-family:\'Bebas Neue\',Arial Narrow,sans-serif;' +
              'font-size:1.1rem;' +
              'text-transform:uppercase;' +
              'letter-spacing:.07em;' +
              'padding:.6rem 1.5rem;' +
              'border-radius:3px;' +
              'text-decoration:none;' +
              'line-height:1;' +
            '">' + data.text + '</a>' +
          '</p>'
        );
      }
    });


    // ── PHOTO GRID EDITOR COMPONENT ──────────────────────────
    // Inserts a dynamic photo grid (2–5 slots) into the rich-text
    // body. Fill 1–5 image slots; add a callout stat to get the
    // gold/charcoal/red tile. Slot count auto-detected from inputs.
    // Callout sits at slot 4 in a 5-slot grid, last slot otherwise.
    //
    // STORAGE: the block written to the markdown file is an EMPTY div
    // carrying only data-pgrid="BASE64" — no child elements at all:
    //   <div class="tw-photo-grid" data-pgrid="…"></div>
    // This is the ONLY shape that survives Decap's editor round-trip.
    // Decap (Slate) keeps the matched opening tag as the component but
    // re-parses ANY child HTML as separate rich-text blocks, which then
    // leak out as raw code below the card. An element with no children
    // has nothing to leak. The real grid (imgs + callout) is rendered
    // on the published site by _includes/photo-grid-hydrate.html, which
    // reads data-pgrid and builds the markup at page load.

    CMS.registerEditorComponent({
      id: 'photo-grid',
      label: 'Photo Grid',
      fields: [
        { name: 'image_1', label: 'Photo 1',            widget: 'image',  required: true  },
        { name: 'alt_1',   label: 'Photo 1 — alt text', widget: 'string', required: false, default: '' },
        { name: 'image_2', label: 'Photo 2',            widget: 'image',  required: false, hint: 'Adds a 2nd slot (minimum grid is 2-slot).' },
        { name: 'alt_2',   label: 'Photo 2 — alt text', widget: 'string', required: false, default: '' },
        { name: 'image_3', label: 'Photo 3 (optional)', widget: 'image',  required: false },
        { name: 'alt_3',   label: 'Photo 3 — alt text', widget: 'string', required: false, default: '' },
        { name: 'image_4', label: 'Photo 4 (optional)', widget: 'image',  required: false },
        { name: 'alt_4',   label: 'Photo 4 — alt text', widget: 'string', required: false, default: '' },
        { name: 'image_5', label: 'Photo 5 (optional)', widget: 'image',  required: false },
        { name: 'alt_5',   label: 'Photo 5 — alt text', widget: 'string', required: false, default: '' },
        {
          name: 'callout_stat',
          label: 'Callout — Stat (e.g. 40+)',
          widget: 'string',
          required: false,
          hint: 'Leave blank to skip the callout tile. A stat uses one of your 2–5 slots.'
        },
        {
          name: 'callout_label',
          label: 'Callout — Label (e.g. Years on the mat)',
          widget: 'string',
          required: false
        },
        {
          name: 'callout_style',
          label: 'Callout — Background',
          widget: 'select',
          options: [
            { label: 'Gold gradient',     value: 'gold'     },
            { label: 'Charcoal gradient', value: 'charcoal' },
            { label: 'Red gradient',      value: 'red'      }
          ],
          default: 'gold'
        }
      ],

      // Matches the empty carrier div. Anchored end-to-end so only the
      // exact childless element matches — nothing for Decap to split.
      pattern: /^<div class="tw-photo-grid" data-pgrid="([A-Za-z0-9+\/=]+)"><\/div>$/,

      fromBlock: function(match) {
        try {
          var decoded = decodeURIComponent(
            atob(match[1]).split('').map(function(c) {
              return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join('')
          );
          return JSON.parse(decoded);
        } catch(e) { return {}; }
      },

      toBlock: function(data) {
        // Serialise every field into the base64 payload — the frontend
        // hydration script reconstructs the grid from exactly this data,
        // using the same slot logic mirrored in toPreview below.
        var raw = {
          image_1: data.image_1 || '', alt_1: data.alt_1 || '',
          image_2: data.image_2 || '', alt_2: data.alt_2 || '',
          image_3: data.image_3 || '', alt_3: data.alt_3 || '',
          image_4: data.image_4 || '', alt_4: data.alt_4 || '',
          image_5: data.image_5 || '', alt_5: data.alt_5 || '',
          callout_stat: data.callout_stat || '',
          callout_label: data.callout_label || '',
          callout_style: data.callout_style || 'gold'
        };
        var encoded = btoa(
          encodeURIComponent(JSON.stringify(raw)).replace(/%([0-9A-F]{2})/g, function(m, p1) {
            return String.fromCharCode(parseInt(p1, 16));
          })
        );

        // Empty, childless carrier — nothing for Decap to split apart.
        return '<div class="tw-photo-grid" data-pgrid="' + encoded + '"></div>';
      },

      toPreview: function(data) {
        // ── same slot logic as toBlock ────────────────────────
        var images = [];
        for (var i = 1; i <= 5; i++) {
          if (data['image_' + i]) images.push({ src: data['image_' + i], alt: data['alt_' + i] || '' });
        }
        var hasCallout = !!(data.callout_stat && data.callout_stat.trim());
        var total = Math.min(5, Math.max(2, images.length + (hasCallout ? 1 : 0)));
        images = images.slice(0, total - (hasCallout ? 1 : 0));
        var calloutPos = (total === 5 && hasCallout) ? 4 : (hasCallout ? total : 0);
        var safeStyle  = ['gold','charcoal','red'].indexOf(data.callout_style) >= 0 ? data.callout_style : 'gold';
        var slots = [], imgIdx = 0;
        for (var s = 1; s <= total; s++) {
          if (hasCallout && s === calloutPos) {
            slots.push({ type: 'callout', stat: data.callout_stat.trim(), label: (data.callout_label || '').trim(), style: safeStyle });
          } else if (imgIdx < images.length) {
            slots.push({ type: 'image', src: images[imgIdx].src, alt: images[imgIdx].alt });
            imgIdx++;
          }
        }

        // ── inline grid styles per slot count ─────────────────
        var gridCss = {
          2: 'display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:200px;gap:0.5rem;',
          3: 'display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:160px;gap:0.5rem;',
          4: 'display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:190px;gap:0.5rem;',
          5: 'display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:70px;gap:0.5rem;'
        };
        var spanMap = ['','grid-column:span 2;grid-row:span 2;','grid-column:span 2;grid-row:span 3;','grid-column:span 2;grid-row:span 2;','grid-column:span 2;grid-row:span 1;','grid-column:span 4;grid-row:span 2;'];
        function slotCss(tot, n) {
          if (tot === 3 && n === 1) return 'grid-column:span 2;';
          if (tot === 5) return spanMap[n] || '';
          return '';
        }
        var bgs   = { gold:'linear-gradient(180deg,#D2B26A,#B08F4B)', charcoal:'linear-gradient(180deg,#39404D,#12151B)', red:'linear-gradient(180deg,#E11414,#BC0808)' };
        var texts = { gold:'#12151B', charcoal:'#F8F6F1', red:'#fff' };

        var html = '<figure style="' + (gridCss[total] || gridCss[5]) + 'border-radius:3px;overflow:hidden;margin:0;padding:0;">';
        slots.forEach(function(slot, idx) {
          var n = idx + 1;
          var span = slotCss(total, n);
          if (slot.type === 'image') {
            html += '<img src="' + slot.src + '" alt="' + slot.alt + '" style="' + span + 'width:100%;height:100%;object-fit:cover;display:block;">';
          } else {
            html += '<span style="' + span + 'display:flex;flex-direction:column;justify-content:center;padding:0.75rem;background:' + (bgs[slot.style]||bgs.gold) + ';color:' + (texts[slot.style]||texts.gold) + ';">';
            html += '<span style="font-family:\'Bebas Neue\',Arial Narrow,sans-serif;font-size:1.8rem;line-height:1;display:block;">' + slot.stat + '</span>';
            html += '<span style="font-weight:700;text-transform:uppercase;letter-spacing:0.08em;font-size:0.65rem;display:block;margin-top:0.15rem;">' + slot.label + '</span>';
            html += '</span>';
          }
        });
        html += '</figure>';
        return html;
      }
    });
  </script>
</body>
</html>
