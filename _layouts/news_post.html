---
layout: default
---
<header class="masthead news-hero">
	<div class="container">
		<div class="intro-video">
			<div class="embed-container">
				<img src="{{ page.image }}" alt="{{ page.title | escape }}" />
			</div>
		</div>
	</div>
</header>
<div class="container" id="pagecontainer">
<section class="page-section" id="news-article">
	<div class="container">
		<div class="row">
			<div class="col-lg-12 text-center">
				<h1 class="section-heading text-uppercase">{{ page.title | escape }}</h1>
				<h3 class="section-subheading text-muted">{{ page.date | date: "%B %-d, %Y" }}</h3>
			</div>
		</div>
		<div class="row">
			<div class="col-md-10 offset-md-1">
				{{ content }}
			</div>
		</div>
	</div>
</section>

{% include programs.html %}
</div>
