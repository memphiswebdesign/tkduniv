<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>
    <!-- SVG filter for the .tw-belt-stripe brush-stroke effect (Tailwind design system) -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <filter id="brush" x="-15%" y="-40%" width="130%" height="180%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.09"
          numOctaves="1" seed="4" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="3"/>
      </filter>
    </svg>
  	<!-- Google Tag Manager (noscript) -->
		<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M6BLVK3"
		height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
		<!-- End Google Tag Manager (noscript) -->
  	{% include nav.html %}
    <div id="page" class="{{ page.title | slugify }}">
      <div id="content">{{ content }}</div>
      
      {% include footer.html %}
	</div>
		<!-- LazySizes.js -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/lazysizes/5.3.2/lazysizes.min.js" integrity="sha512-q583ppKrCRc7N5O0n2nzUiJ+suUv7Et1JGels4bXOaMFQcamPk9HjdUknZuuFjBNs7tsMuadge5k9RzdmO+1GQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
      <!-- Bootstrap core JavaScript -->
	  <script src="{{ "/assets/js/jquery.min.js" | relative_url }}"></script>
	  <script src="{{ "/assets/js/bootstrap.bundle.min.js" | relative_url }}"></script>
	  <!-- Plugin JavaScript -->
	  <script src="{{ "/assets/js/jquery.easing.min.js" | relative_url }}"></script>
	  <!-- Contact form JavaScript -->
	  <script src="{{ "/assets/js/jqBootstrapValidation.js" | relative_url }}"></script>
	  <script src="{{ "/assets/js/contact_me.js" | relative_url }}"></script>
	  <!-- Custom scripts for this template -->
	  <script src="{{ "/assets/js/agency.min.js" | relative_url }}"></script>
	  <!-- Tailwind design system JS (scroll reveal fallback + carousel helper) -->
	  <script src="{{ "/src/js/main.js" | relative_url }}" defer></script>
  </body>
</html>
